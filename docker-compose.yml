version: '3.8'

services:
  # MongoDB for product catalog
  mongodb:
    image: mongo:latest
    container_name: amazon_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: amazon_clone
    volumes:
      - mongodb_data:/data/db
    networks:
      - amazon_network

  # PostgreSQL for user data and orders
  postgres:
    image: postgres:15
    container_name: amazon_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: amazon_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amazon_network

  # Redis for caching
  redis:
    image: redis:alpine
    container_name: amazon_redis
    ports:
      - "6379:6379"
    networks:
      - amazon_network

volumes:
  mongodb_data:
  postgres_data:

networks:
  amazon_network:
    driver: bridge
